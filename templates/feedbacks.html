<!DOCTYPE html>
<html>
<head>
<title>Feedback List</title>

<style>
body {
    background: #0f2027;
    color: white;
    font-family: Arial;
    margin: 0;
}

.navbar {
    background: #1f1f1f;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    width: 500px;
    margin: 40px auto;
}

.card {
    background: #1c1c1c;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

.time {
    font-size: 12px;
    color: gray;
}

button {
    background: red;
    border: none;
    color: white;
    padding: 5px;
    cursor: pointer;
}
</style>

<script>
function confirmDelete() {
    return confirm("Are you sure you want to delete this feedback?");
}
</script>

</head>

<body>

<div class="navbar">
    <h2>📋 Feedback List</h2>
    <a href="/home"><button>Home</button></a>
</div>

<div class="container">

{% for row in data %}
<div class="card">
<b>{{ row[1] }}</b><br>
{{ row[2] }}<br>
<span class="time">{{ row[3] }}</span>

<form action="/delete/{{ row[0] }}" method="POST" onsubmit="return confirmDelete();">
<button>Delete</button>
</form>
</div>
{% endfor %}

</div>

</body>
</html>
