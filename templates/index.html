<!DOCTYPE html>
<html>
<head>
<title>College Feedback System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

/* 🔥 NAVBAR */
.navbar {
    background: #1f1f1f;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.navbar h2 {
    margin: 0;
}

.container {
    width: 350px;
    margin: 80px auto;
    background: #1e1e1e;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #333;
    color: white;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #00c6ff;
    border: none;
    color: white;
    cursor: pointer;
}

.logout {
    background: red;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>🎓 College Feedback</h2>
    <a href="/logout"><button class="logout">Logout</button></a>
</div>

<div class="container">
<h3>Submit Feedback</h3>

<form method="POST">
<input name="name" placeholder="Your Name" required>
<textarea name="feedback" placeholder="Your Feedback" required></textarea>
<button>Submit</button>
</form>

{% if success %}
<p>✅ Submitted successfully!</p>
{% endif %}

<a href="/feedbacks">
<button>View Feedback</button>
</a>

</div>

</body>
</html>
